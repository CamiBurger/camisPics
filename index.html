<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>camis.pics</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: #000;
      overflow-x: hidden;
    }

    #gallery {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      gap: 1.5vw;
      padding: calc(3vw + min(4.8vh, 6.8vw)) 1.5vw 0;
    }

    .blurb-card {
      width: 100%;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Helvetica, Arial, sans-serif;
      font-size: min(2.24vh, 3.2vw);
      color: #fff;
      text-align: center;
      padding: 0 8vw;
      will-change: transform;
    }

    .col {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 1.5vw;
    }

    .photo-card {
      will-change: transform;
      cursor: zoom-in;
    }

    .photo-card img {
      display: block;
      width: 100%;
      height: auto;
    }

    #site-title {
      position: fixed;
      top: 1.5vw;
      left: 50%;
      transform: translateX(-50%);
      z-index: 999999;
      pointer-events: auto;
      cursor: pointer;
      padding: 0.25em 0.55em;
      border-radius: 0.4em;
      white-space: nowrap;
      font-family: Helvetica, Arial, sans-serif;
      font-size: min(2.8vh, 4vw);
      color: #fff;
    }

    #zoom-overlay {
      position: fixed;
      inset: 0;
      z-index: 100000;
      pointer-events: none;
    }
    #zoom-overlay.active { pointer-events: auto; }
    #zoom-overlay img {
      position: absolute;
      object-fit: contain;
      cursor: zoom-out;
    }
  </style>
</head>
<body>
  <div id="site-title" onclick="location.reload()">camis.pics</div>
  <main id="gallery"></main>
  <div id="zoom-overlay"></div>
  <script>
    // ── state ───────────────────────────────────────────────────────────
    const gallery = document.getElementById('gallery');
    const BATCH   = 5;

    let queue = [], loaded = 0, busy = false;
    let allCards = [];
    let blurbText = null, blurbEl = null;

    let zoomedCard    = null;
    let zoomProg      = 0;
    let zoomAnimDir   = 0;
    let zoomStartRect = null;

    // ── blurb ────────────────────────────────────────────────────────────
    function appendBlurb() {
      if (!blurbText || blurbEl) return;
      blurbEl = document.createElement('div');
      blurbEl.className = 'blurb-card';
      blurbEl.textContent = blurbText;
      blurbEl.style.opacity = '0.2';
      blurbEl.style.filter = 'blur(4px)';
      blurbEl.style.transform = 'scale(0.6)';
      gallery.appendChild(blurbEl);
    }

    // ── column setup ─────────────────────────────────────────────────────
    // 2.2 ≈ ultra-wide, 1.5 ≈ standard landscape, <1.5 = portrait → 2 columns
    function getColCount() {
      const ratio = window.innerWidth / window.innerHeight;
      return ratio >= 2.2 ? 4 : ratio >= 1.5 ? 3 : 2;
    }

    let colCount = 0;
    const cols = [];

    function setupColumns(count) {
      cols.forEach(col => col.remove());
      cols.length = 0;
      colCount = count;
      for (let i = 0; i < count; i++) {
        const col = document.createElement('div');
        col.className = 'col';
        if (blurbEl && blurbEl.parentNode === gallery) {
          gallery.insertBefore(col, blurbEl);
        } else {
          gallery.appendChild(col);
        }
        cols.push(col);
      }
    }

    function redistributeCards() {
      cols.forEach(col => { while (col.firstChild) col.firstChild.remove(); });
      allCards.forEach((card, i) => {
        const colIdx = shortestCol();
        card._colIdx = colIdx;
        card._row = Math.floor(i / colCount);
        cols[colIdx].appendChild(card);
      });
    }

    setupColumns(getColCount());

    // new photos always go to the shortest column (masonry);
    // ties broken by card count to prevent systematic left-column bias
    function shortestCol() {
      return cols.reduce((best, col, i) => {
        if (col.scrollHeight < cols[best].scrollHeight) return i;
        if (col.scrollHeight === cols[best].scrollHeight &&
            col.children.length < cols[best].children.length) return i;
        return best;
      }, 0);
    }

    // ── utilities ────────────────────────────────────────────────────────

    // Fisher-Yates shuffle with a deterministic hash-based RNG so order is
    // random each page load but stable within a session
    function seededShuffle(arr, seed) {
      let s = seed >>> 0;
      function rand() {
        s = (s + 0x6D2B79F5) >>> 0;
        let t = Math.imul(s ^ (s >>> 15), 1 | s);
        t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      }
      const a = arr.slice();
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(rand() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function easeOut(t) { return 1 - Math.pow(1 - t, 3); } // cubic ease-out

    // randomly pick skewY direction for row 0; subsequent rows alternate
    const firstSkewSign = Math.random() < 0.5 ? 1 : -1;

    // ── zoom helpers ──────────────────────────────────────────────────────
    // Algebraically derives where the bottom of #site-title is:
    //   top: 1.5vw  +  element height (font-size * 1.5, because padding is 0.25em top+bottom)
    //   font-size: min(2.8vh, 4vw)
    function getTopBoundary() {
      const vw = window.innerWidth / 100;
      const vh = window.innerHeight / 100;
      const fs = Math.min(2.8 * vh, 4 * vw);
      return 1.5 * vw + 1.5 * fs + 12;
    }

    function getZoomTargetRect() {
      const W = window.innerWidth, H = window.innerHeight;
      const top = getTopBoundary();
      return { left: W * 0.025, top, width: W * 0.95, height: H - top - H * 0.025 };
    }

    function openZoom(card) {
      if (zoomedCard) return;
      const rect = card.getBoundingClientRect();
      zoomStartRect = { left: rect.left, top: rect.top, width: rect.width, height: rect.height };
      zoomedCard = card;
      card.style.visibility = 'hidden';
      document.documentElement.style.overflow = 'hidden';
      document.body.style.overflow = 'hidden';

      const overlayEl = document.getElementById('zoom-overlay');
      const img = document.createElement('img');
      img.src = card.querySelector('img').src;
      img.style.cssText = `left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;height:${rect.height}px;`;
      overlayEl.appendChild(img);
      overlayEl.classList.add('active');

      img.offsetWidth; // force reflow before transition

      const t = getZoomTargetRect();
      img.style.transition = 'left .26s cubic-bezier(.4,0,.1,1),top .26s cubic-bezier(.4,0,.1,1),width .26s cubic-bezier(.4,0,.1,1),height .26s cubic-bezier(.4,0,.1,1)';
      img.style.left = t.left + 'px'; img.style.top = t.top + 'px';
      img.style.width = t.width + 'px'; img.style.height = t.height + 'px';

      img.addEventListener('click', closeZoom, { once: true });
      zoomAnimDir = 1;
    }

    function closeZoom() {
      if (!zoomedCard) return;
      const overlayEl = document.getElementById('zoom-overlay');
      overlayEl.classList.remove('active');
      const img = overlayEl.querySelector('img');
      const r = zoomStartRect;
      img.style.transition = 'left .22s cubic-bezier(.4,0,.1,1),top .22s cubic-bezier(.4,0,.1,1),width .22s cubic-bezier(.4,0,.1,1),height .22s cubic-bezier(.4,0,.1,1)';
      img.style.left = r.left + 'px'; img.style.top = r.top + 'px';
      img.style.width = r.width + 'px'; img.style.height = r.height + 'px';
      zoomAnimDir = -1;
      img.addEventListener('transitionend', () => {
        const card = zoomedCard;
        zoomedCard = null;
        overlayEl.innerHTML = '';
        card.style.visibility = '';
        document.documentElement.style.overflow = '';
        document.body.style.overflow = '';
      }, { once: true });
    }

    function updateZoomRect() {
      const overlayImg = document.querySelector('#zoom-overlay img');
      if (!overlayImg || zoomAnimDir !== 0 || zoomProg !== 1) return;
      zoomStartRect = zoomedCard.getBoundingClientRect();
      const t = getZoomTargetRect();
      overlayImg.style.transition = 'left .15s ease,top .15s ease,width .15s ease,height .15s ease';
      overlayImg.style.left   = t.left   + 'px';
      overlayImg.style.top    = t.top    + 'px';
      overlayImg.style.width  = t.width  + 'px';
      overlayImg.style.height = t.height + 'px';
    }

    // ── batch loader ─────────────────────────────────────────────────────
    function loadBatch() {
      if (busy || loaded >= queue.length) return;
      busy = true;
      queue.slice(loaded, loaded + BATCH).forEach(photo => {
        const card     = document.createElement('div');
        card.className = 'photo-card';
        const colIdx   = shortestCol();
        card._colIdx   = colIdx;
        card._row      = Math.floor(allCards.length / colCount);

        const img   = document.createElement('img');
        img.src     = photo.url;
        img.alt     = '';
        img.loading = 'lazy';
        card.appendChild(img);

        cols[colIdx].appendChild(card);
        allCards.push(card);
        card.addEventListener('click', () => { if (!zoomedCard) openZoom(card); });
      });
      loaded += BATCH;
      busy = false;
      if (loaded >= queue.length) requestAnimationFrame(appendBlurb);
      requestAnimationFrame(checkFill);
    }

    const siteTitle = document.getElementById('site-title');

    // ── animation loop ───────────────────────────────────────────────────
    //
    // Scroll-driven entrance animation for every card:
    //   p=0 → born at viewport bottom: scale 0.6, blurry, skewed, fanned to gallery center
    //   p=1 → settled: scale 1, blur 0, skew 0, at natural column position
    //   above fold → identity transform cleared for performance
    function tick() {
      const sy   = window.scrollY;
      const vh   = window.innerHeight;
      const gw   = gallery.offsetWidth;
      const colW = gw / colCount;
      const galTop = gallery.offsetTop;

      // ── zoom progress ──
      const ZOOM_STEP = 0.085;
      if      (zoomAnimDir ===  1) { zoomProg = Math.min(1, zoomProg + ZOOM_STEP); if (zoomProg === 1) zoomAnimDir = 0; }
      else if (zoomAnimDir === -1) { zoomProg = Math.max(0, zoomProg - ZOOM_STEP); if (zoomProg === 0) zoomAnimDir = 0; }

      // ── title fade ──
      // fades out as user scrolls down, fades back in near the bottom of the page
      const fadeProg   = Math.min(1, sy / (vh * 0.35));
      const fadedAlpha = 1 - fadeProg * (1 - 0.15);
      const maxScroll  = document.body.scrollHeight - vh;
      const bottomProg = Math.max(0, Math.min(1, (sy - (maxScroll - vh * 0.5)) / (vh * 0.5)));
      const baseAlpha  = fadedAlpha + (1 - fadedAlpha) * bottomProg;
      const titleAlpha = (baseAlpha + (1 - baseAlpha) * zoomProg).toFixed(3);
      siteTitle.style.color         = `rgba(255,255,255,${titleAlpha})`;
      siteTitle.style.pointerEvents = parseFloat(titleAlpha) >= 0.85 ? 'auto' : 'none';

      // ── pass 1: read ─────────────────────────────────────────────────
      // gather each row's earliest natural page Y before writing any transforms;
      // all cards in the same row share this so they animate in sync
      const rowRefY = {};
      allCards.forEach(card => {
        const pageY = card.offsetTop + cols[card._colIdx].offsetTop + galTop;
        if (rowRefY[card._row] === undefined || pageY < rowRefY[card._row]) {
          rowRefY[card._row] = pageY;
        }
      });

      // ── pass 2: write ─────────────────────────────────────────────────
      allCards.forEach(card => {
        const refNatViewY = rowRefY[card._row] - sy;

        if (refNatViewY < -vh * 0.5) {
          card.style.transform = '';
          card.style.opacity   = '';
          card.style.filter    = '';
          return;
        }

        const ENTRY   = vh * 0.95;
        const SETTLED = vh * 0.2;
        const p = Math.max(0, Math.min(1, (ENTRY - refNatViewY) / (ENTRY - SETTLED)));
        const e = easeOut(p);

        let ty = (ENTRY - refNatViewY) * (1 - e);

        const dx = (card._colIdx - (colCount - 1) / 2) * colW;
        let tx = -dx * (1 - e);

        const SKEW_X_MAX = 8;
        const SKEW_Y_MAX = 5;
        const SKEW_Y_MIN = 1.5;
        const skewDir  = dx / (gw / 2);
        const SKEW_END = vh * 0.5;
        const skewP    = Math.max(0, Math.min(1, (ENTRY - refNatViewY) / (ENTRY - SKEW_END)));
        const skewArc  = skewP * (1 - skewP) * (1 - skewP) * (27 / 4); // peaks at skewP≈0.33
        const skewX    = -skewDir * skewArc * SKEW_X_MAX;
        const rowSign  = firstSkewSign * (card._row % 2 === 0 ? 1 : -1);
        const skewY    = rowSign * (SKEW_Y_MIN + (SKEW_Y_MAX - SKEW_Y_MIN) * Math.pow(1 - Math.abs(skewDir), 2)) * skewArc;

        const blurFloor = vh * 0.6;
        const blurProg  = Math.max(0, Math.min(1, (refNatViewY - blurFloor) / (ENTRY - blurFloor)));
        let blur        = 4 * blurProg;

        const scale = 0.6 + e * 0.4;

        const opacityProg = Math.max(0, Math.min(1, (ENTRY - refNatViewY) / (ENTRY - vh * 0.4)));
        let opacity       = 0.2 + easeOut(opacityProg) * 0.8;

        if (zoomProg > 0 && zoomedCard) {
          if (card === zoomedCard) {
            card.style.transform = ''; card.style.opacity = ''; card.style.filter = '';
            return;
          }
          const colDiff = card._colIdx - zoomedCard._colIdx;
          tx += colDiff * 120 * zoomProg;
          if (card._colIdx === zoomedCard._colIdx) {
            const rowDiff = card._row - zoomedCard._row;
            ty += Math.sign(rowDiff) * 80 * zoomProg;
          }
          blur    = Math.max(blur, 8 * zoomProg);
          opacity = opacity * (1 - 0.55 * zoomProg);
        }

        card.style.opacity   = opacity.toFixed(3);
        card.style.filter    = `blur(${blur.toFixed(1)}px)`;
        card.style.transform =
          `translateX(${tx.toFixed(1)}px) ` +
          `translateY(${ty.toFixed(1)}px) ` +
          `skewX(${skewX.toFixed(2)}deg) ` +
          `skewY(${skewY.toFixed(2)}deg) ` +
          `scale(${scale.toFixed(3)})`;
      });

      // ── blurb ──
      if (blurbEl) {
        const refY = blurbEl.offsetTop + galTop - sy;

        if (refY < -vh * 0.5) {
          blurbEl.style.transform = '';
          blurbEl.style.opacity   = '';
          blurbEl.style.filter    = '';
        } else {
          const ENTRY   = vh * 0.95;
          const SETTLED = vh * 0.2;
          const p = Math.max(0, Math.min(1, (ENTRY - refY) / (ENTRY - SETTLED)));
          const e = easeOut(p);

          const ty      = (ENTRY - refY) * (1 - e);
          const skewP   = Math.max(0, Math.min(1, (ENTRY - refY) / (ENTRY - vh * 0.5)));
          const skewArc = skewP * (1 - skewP) * (1 - skewP) * (27 / 4);
          const skewY   = skewArc * 5;
          const scale   = 0.6 + e * 0.4;

          const opacityProg = Math.max(0, Math.min(1, (ENTRY - refY) / (ENTRY - vh * 0.4)));
          const opacity     = 0.2 + easeOut(opacityProg) * 0.8;

          const blurFloor = vh * 0.6;
          const blurProg  = Math.max(0, Math.min(1, (refY - blurFloor) / (ENTRY - blurFloor)));
          const blur      = Math.max(4 * blurProg, 8 * zoomProg).toFixed(1);
          const blurOpacity = zoomProg > 0 ? (opacity * (1 - 0.55 * zoomProg)).toFixed(3) : opacity.toFixed(3);

          blurbEl.style.opacity   = blurOpacity;
          blurbEl.style.filter    = `blur(${blur}px)`;
          blurbEl.style.transform =
            `translateY(${ty.toFixed(1)}px) ` +
            `skewY(${skewY.toFixed(2)}deg) ` +
            `scale(${scale.toFixed(3)})`;
        }
      }

      requestAnimationFrame(tick);
    }

    // ── scroll-driven loading ─────────────────────────────────────────────
    // keeps 1.5 viewports of content pre-loaded ahead of the scroll position
    const THRESHOLD = window.innerHeight * 1.5;

    function checkFill() {
      if (loaded >= queue.length) return;
      if (document.body.offsetHeight < window.innerHeight + window.scrollY + THRESHOLD) {
        loadBatch();
      }
    }

    window.addEventListener('scroll', checkFill, { passive: true });

    let _resizeTimer = null;
    window.addEventListener('resize', () => {
      clearTimeout(_resizeTimer);
      _resizeTimer = setTimeout(() => {
        const newCount = getColCount();
        if (newCount !== colCount) {
          setupColumns(newCount);
          redistributeCards();
        }
        if (zoomedCard) updateZoomRect();
      }, 120);
    });

    // ── data fetching ─────────────────────────────────────────────────────
    fetch('blurb.json')
      .then(r => r.json())
      .then(data => {
        blurbText = data.text;
        if (loaded >= queue.length && queue.length > 0) appendBlurb();
      });

    fetch('photos.json')
      .then(r => r.json())
      .then(photos => {
        queue = seededShuffle(photos, Date.now());
        loadBatch();
      });

    requestAnimationFrame(tick);
  </script>
</body>
</html>
